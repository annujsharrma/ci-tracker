<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16302B">
<meta name="description" content="MediTrack — follow-up tracker for the Corporate & International Desk, SGRH">
<title>MediTrack</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ================================================================
   Design tokens
   ================================================================ */
:root{
  /* color */
  --bg:#F6F7F4;            --surface:#FFFFFF;       --surface-2:#EEF1ED;
  --ink:#16302B;           --ink-2:#3C524B;         --muted:#68776F;
  --faint:#9AA6A0;         --line:#E4E8E2;          --line-2:#D3DAD4;
  --brand:#16302B;
  --accent:#217A56;        --accent-soft:#E6F2EC;
  --warn:#B26A10;          --warn-soft:#FCF1E0;
  --danger:#BC3D2F;        --danger-soft:#FAE9E6;
  /* radius */
  --r-sm:10px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-full:999px;
  /* elevation */
  --sh-sm:0 1px 2px rgba(22,48,43,.05);
  --sh-md:0 2px 8px rgba(22,48,43,.07),0 1px 2px rgba(22,48,43,.05);
  --sh-lg:0 12px 32px rgba(22,48,43,.18),0 2px 8px rgba(22,48,43,.08);
  /* motion */
  --ease:cubic-bezier(.32,.72,0,1);
  --t-fast:.15s; --t-med:.22s;
  /* device */
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

/* ================================================================
   Base
   ================================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI Variable Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg); color:var(--ink);
  overflow-x:clip;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,textarea{font:inherit;-webkit-tap-highlight-color:transparent}
a{-webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ================================================================
   App shell
   ================================================================ */
.app{max-width:520px;margin:0 auto;min-height:100dvh;padding-bottom:calc(124px + var(--safe-b));animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}}

.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#1E4437 0%,#16302B 55%,#11251F 100%);
  border-radius:0 0 24px 24px;
  padding:calc(20px + var(--safe-t)) 20px 52px;
}
.hero::after{
  content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(255,255,255,.07),transparent 65%);
  pointer-events:none;
}
.hero-top{display:flex;justify-content:space-between;align-items:center;position:relative}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-logo{width:44px;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.18);box-shadow:0 4px 12px rgba(0,0,0,.28);flex-shrink:0}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8FBFA6}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:1px;color:#fff}
.iconbtn{
  width:44px;height:44px;display:grid;place-items:center;flex-shrink:0;
  border-radius:var(--r-full);background:var(--surface);border:1px solid var(--line);
  box-shadow:var(--sh-sm);color:var(--ink-2);
  transition:transform var(--t-fast) var(--ease),background var(--t-fast) ease;
}
.iconbtn:hover{background:var(--surface-2)}
.iconbtn:active{transform:scale(.92)}
.hero .iconbtn{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.16);color:#E6EFEA;box-shadow:none}
.hero .iconbtn:hover{background:rgba(255,255,255,.18)}

/* stats — float over the hero edge */
.counts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px;margin-top:-34px;position:relative;z-index:1}
.count{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 14px;box-shadow:var(--sh-md)}
.count b{display:block;font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1.1}
.count span{display:block;margin-top:3px;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.count.late b{color:var(--danger)}
.count.pend b{color:var(--warn)}
.count.open b{color:var(--accent)}

/* search */
.srch{padding:14px 20px 0}
.srchbox{position:relative}
.srchbox svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
.srchbox input{
  width:100%;min-height:46px;border:1px solid var(--line);border-radius:var(--r-full);
  padding:12px 18px 12px 42px;font-size:16px;background:var(--surface);color:var(--ink);box-shadow:var(--sh-sm);
  transition:border-color var(--t-fast) ease,box-shadow var(--t-fast) ease;
}
.srchbox input::placeholder{color:var(--faint)}
.srchbox input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

/* tabs — segmented control */
.tabs{display:flex;gap:4px;margin:14px 20px 10px;padding:4px;background:var(--surface-2);border-radius:var(--r-full)}
.tab{
  flex:1;min-height:44px;border:none;background:transparent;color:var(--muted);
  border-radius:var(--r-full);font-size:13.5px;font-weight:700;
  transition:background var(--t-fast) ease,color var(--t-fast) ease,box-shadow var(--t-fast) ease,transform var(--t-fast) var(--ease);
}
.tab:active{transform:scale(.96)}
.tab.on{background:var(--surface);color:var(--ink);box-shadow:var(--sh-md)}

/* ================================================================
   Case list
   ================================================================ */
.list{padding:4px 20px 0}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:16px;margin-bottom:12px;box-shadow:var(--sh-sm);overflow-wrap:anywhere;
  animation:cardIn .24s var(--ease) backwards;animation-delay:calc(var(--i,0)*30ms);
  transition:box-shadow var(--t-fast) ease;
}
@media (hover:hover){.card:hover{box-shadow:var(--sh-md)}}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}}
.card.flag{border-color:var(--danger);box-shadow:0 0 0 1px var(--danger) inset,var(--sh-sm)}

.row1{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.who{min-width:0}
.who .nm{font-size:16px;font-weight:700;letter-spacing:-.01em}
.who .co{font-size:13px;color:var(--muted);margin-top:2px}

.dchip{min-width:82px;text-align:center;border-radius:var(--r-md);padding:8px 10px;font-variant-numeric:tabular-nums;flex-shrink:0}
.dchip b{display:block;font-size:15px;font-weight:800;line-height:1.15}
.dchip span{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;opacity:.85}
.d-ok{background:var(--accent-soft);color:var(--accent)}
.d-warn{background:var(--warn-soft);color:var(--warn)}
.d-late{background:var(--danger-soft);color:var(--danger)}

.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pill{font-size:11px;font-weight:600;background:var(--surface-2);color:var(--ink-2);border-radius:var(--r-full);padding:5px 10px}
.pill.alert{background:var(--danger);color:#fff}
.pill.chased{background:var(--warn-soft);color:var(--warn)}
.pill.cat{background:var(--brand);color:#fff}

.contact{font-size:13.5px;margin-top:10px}
.contact a{color:var(--accent);font-weight:700;text-decoration:none}
.fulog{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.55;white-space:pre-line}

.acts{display:flex;gap:8px;margin-top:10px}
.btn{
  flex:1;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid var(--line);background:var(--surface);border-radius:var(--r-md);
  padding:10px 10px;font-size:13px;font-weight:700;color:var(--ink);box-shadow:var(--sh-sm);
  transition:background var(--t-fast) ease,transform var(--t-fast) var(--ease),border-color var(--t-fast) ease,filter var(--t-fast) ease;
}
.btn:hover{background:var(--surface-2)}
.btn:active{transform:scale(.97)}
.btn.pri{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.grn{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.pri:hover,.btn.grn:hover,.btn.dangerpri:hover{filter:brightness(1.12);background:revert-layer}
.btn.pri:hover{background:var(--brand)} .btn.grn:hover{background:var(--accent)}
.btn.sm{flex:0 0 68px}
.btn.danger{color:var(--danger);flex:0 0 auto;padding:10px 14px}
.btn.dangerpri{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn.dangerpri:hover{background:var(--danger)}
.btn svg{flex-shrink:0}

/* FAB */
.fab{
  position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#1E4A3B,#16302B);color:#fff;border-radius:var(--r-full);
  min-height:52px;padding:0 26px;font-size:15px;font-weight:700;
  display:inline-flex;align-items:center;gap:8px;z-index:5;
  box-shadow:0 12px 28px rgba(22,48,43,.35),0 2px 8px rgba(22,48,43,.15);
  transition:transform var(--t-fast) var(--ease),filter var(--t-fast) ease;
}
.fab:hover{filter:brightness(1.15)}
.fab:active{transform:translateX(-50%) scale(.95)}

/* empty state */
.empty{padding:48px 24px;text-align:center;color:var(--muted);animation:fadeIn .3s ease}
.empty .ic{width:72px;height:72px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;margin:0 auto 14px}
.empty .ic svg{width:30px;height:30px;color:var(--faint)}
.empty b{display:block;font-size:15px;color:var(--ink-2);font-weight:700;margin-bottom:4px}
.empty p{font-size:13.5px;line-height:1.55;max-width:300px;margin:0 auto}

.note{font-size:12.5px;color:var(--muted);text-align:center;padding:14px 28px 6px;line-height:1.55}

/* ================================================================
   Overlays: backdrop, bottom sheets, panels, dialog, toast
   ================================================================ */
.sheetbg{
  position:fixed;inset:0;background:rgba(15,25,22,.44);z-index:10;
  opacity:0;pointer-events:none;transition:opacity var(--t-med) ease;
}
.sheetbg.open{opacity:1;pointer-events:auto}

.sheet{
  position:fixed;left:50%;bottom:0;width:100%;max-width:520px;z-index:11;
  background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:12px 20px calc(24px + var(--safe-b));
  max-height:90dvh;overflow-y:auto;box-shadow:var(--sh-lg);
  transform:translate(-50%,105%);visibility:hidden;
  transition:transform var(--t-med) var(--ease),visibility 0s linear var(--t-med);
}
.sheet.open{transform:translate(-50%,0);visibility:visible;transition:transform var(--t-med) var(--ease)}
.sheet::before{content:"";display:block;width:36px;height:4px;border-radius:2px;background:var(--line-2);margin:0 auto 14px}
.sheet h2{font-size:17px;font-weight:800;margin-bottom:16px;letter-spacing:-.01em}

/* form fields */
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fld input,.fld select,.fld textarea{
  width:100%;min-height:46px;border:1px solid var(--line);border-radius:var(--r-md);
  padding:12px 14px;font-size:16px;color:var(--ink);background:var(--bg);
  transition:border-color var(--t-fast) ease,box-shadow var(--t-fast) ease,background var(--t-fast) ease;
}
.fld input::placeholder,.fld textarea::placeholder{color:var(--faint)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
.fld textarea{resize:vertical;min-height:64px}
.two{display:flex;gap:10px}
.two .fld{flex:1;min-width:0}

/* segmented control */
.seg{display:flex;gap:4px;margin-bottom:16px;background:var(--surface-2);padding:4px;border-radius:var(--r-md)}
.seg button{
  flex:1;min-height:44px;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted);
  transition:background var(--t-fast) ease,color var(--t-fast) ease,box-shadow var(--t-fast) ease;
}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--sh-md)}

/* company dropdown */
.codrop{position:relative}
.colist{
  position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:30;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
  max-height:220px;overflow-y:auto;box-shadow:var(--sh-lg);
  opacity:0;transform:translateY(-4px);pointer-events:none;
  transition:opacity var(--t-fast) ease,transform var(--t-fast) var(--ease);
}
.colist.open{opacity:1;transform:none;pointer-events:auto}
.coopt{padding:13px 14px;font-size:14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background var(--t-fast) ease}
.coopt:hover{background:var(--surface-2)}
.coopt:last-child{border-bottom:none}
.coopt.addnew{color:var(--accent);font-weight:700}

.savebar{display:flex;gap:8px;margin-top:8px}
.savebar .btn{min-height:48px;font-size:14px}

/* reference menu */
.menuitem{
  width:100%;display:flex;align-items:center;gap:12px;margin-bottom:8px;
  padding:12px 14px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--bg);
  font-size:14px;font-weight:700;color:var(--ink);text-align:left;
  transition:background var(--t-fast) ease,transform var(--t-fast) var(--ease);
}
.menuitem:hover{background:var(--surface-2)}
.menuitem:active{transform:scale(.98)}
.menuitem .mi-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);flex-shrink:0}
.menuitem .chev{margin-left:auto;color:var(--faint)}

/* full-screen panels */
.panel{
  position:fixed;inset:0;background:var(--bg);z-index:20;overflow-y:auto;
  transform:translateX(100%);visibility:hidden;
  transition:transform var(--t-med) var(--ease),visibility 0s linear var(--t-med);
}
.panel.open{transform:none;visibility:visible;transition:transform var(--t-med) var(--ease)}
.panel-in{max-width:520px;margin:0 auto;padding:calc(16px + var(--safe-t)) 20px calc(48px + var(--safe-b))}
.panel-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.panel-hdr h2{font-size:19px;font-weight:800;flex:1;letter-spacing:-.01em}
.addco{
  min-height:44px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);
  border-radius:var(--r-full);padding:0 16px;font-size:13px;font-weight:700;
  transition:transform var(--t-fast) var(--ease),filter var(--t-fast) ease;
}
.addco:active{transform:scale(.95)}

/* accordion cards */
.ecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:8px;box-shadow:var(--sh-sm)}
.ehead{
  width:100%;min-height:52px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px;font-size:15px;font-weight:700;text-align:left;color:var(--ink);
}
.ehead .esub{font-weight:600;color:var(--muted);font-size:12px;margin-left:auto}
.ehead .chev{color:var(--faint);flex-shrink:0;transition:transform var(--t-med) var(--ease)}
.ecard.open .ehead .chev{transform:rotate(180deg)}
.ereveal{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--t-med) var(--ease)}
.ecard.open .ereveal{grid-template-rows:1fr}
.ebody{overflow:hidden;min-height:0}
.ebody-in{padding:0 14px 14px}
.lines{font-size:13px;line-height:1.7;white-space:pre-line;color:var(--ink)}
.ebody-in textarea{
  width:100%;border:1px solid var(--line);border-radius:var(--r-md);padding:12px;
  font-size:16px;min-height:140px;background:var(--bg);color:var(--ink);
  transition:border-color var(--t-fast) ease,box-shadow var(--t-fast) ease;
}
.ebody-in textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.eacts{display:flex;gap:8px;margin-top:10px}

/* dialog (replaces confirm / prompt) */
.dlgbg{
  position:fixed;inset:0;background:rgba(15,25,22,.5);z-index:40;
  opacity:0;pointer-events:none;transition:opacity var(--t-fast) ease;
}
.dlgbg.open{opacity:1;pointer-events:auto}
.dlg{
  position:fixed;left:50%;top:50%;z-index:41;width:calc(100% - 48px);max-width:340px;
  background:var(--surface);border-radius:var(--r-lg);padding:22px 20px 16px;
  box-shadow:var(--sh-lg);text-align:center;
  opacity:0;transform:translate(-50%,-50%) scale(.94);visibility:hidden;
  transition:opacity var(--t-fast) ease,transform var(--t-fast) var(--ease),visibility 0s linear var(--t-fast);
}
.dlg.open{opacity:1;transform:translate(-50%,-50%) scale(1);visibility:visible;transition:opacity var(--t-fast) ease,transform var(--t-fast) var(--ease)}
.dlg h3{font-size:16px;font-weight:800;letter-spacing:-.01em}
.dlg p{font-size:13.5px;color:var(--muted);line-height:1.55;margin-top:6px}
.dlg .fld{margin:14px 0 0;text-align:left}
.dlg-acts{display:flex;gap:8px;margin-top:18px}

/* toast */
.toast{
  position:fixed;top:calc(14px + var(--safe-t));left:50%;z-index:60;
  display:flex;align-items:center;gap:9px;max-width:calc(100% - 32px);
  background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;
  padding:12px 18px;border-radius:var(--r-md);box-shadow:var(--sh-lg);
  opacity:0;transform:translate(-50%,-12px);pointer-events:none;
  transition:opacity var(--t-med) ease,transform var(--t-med) var(--ease);
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast .dot{width:8px;height:8px;border-radius:50%;background:#4CAF87;flex-shrink:0}
.toast.warn .dot{background:#E2A33C}
.toast.danger .dot{background:#E5776A}
.toast-undo{margin-left:6px;flex-shrink:0;background:rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:6px 13px;font-size:12.5px;font-weight:800;min-height:34px;transition:background var(--t-fast) ease,transform var(--t-fast) var(--ease)}
.toast-undo:hover{background:rgba(255,255,255,.28)}
.toast-undo:active{transform:scale(.93)}

/* ================================================================
   Login overlay
   ================================================================ */
.login{
  position:fixed;inset:0;z-index:70;
  background:linear-gradient(160deg,#1E4437 0%,#16302B 55%,#11251F 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity var(--t-med) ease;
}
.login.show{opacity:1;pointer-events:auto}
.login-card{
  width:100%;max-width:360px;background:var(--surface);border-radius:var(--r-xl);
  padding:28px 24px calc(24px + var(--safe-b));box-shadow:var(--sh-lg);text-align:center;
  animation:cardIn .3s var(--ease) backwards;
}
.login-logo{width:60px;height:60px;border-radius:16px;box-shadow:var(--sh-md);margin-bottom:14px}
.login-card h2{font-size:22px;font-weight:800;letter-spacing:-.02em}
.login-sub{font-size:13.5px;color:var(--muted);margin-top:4px;line-height:1.5}
#loginForm{margin-top:20px;text-align:left}
.login-btn{width:100%;min-height:50px;font-size:15px;margin-top:4px}
.login-err{
  font-size:13px;font-weight:600;color:var(--danger);background:var(--danger-soft);
  border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px;line-height:1.45;
}
.login-note{font-size:12px;color:var(--faint);margin-top:16px}

/* account block in the reference menu */
.acct{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.acct-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.acct-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 0 3px var(--accent-soft)}
.acct-email{font-size:13px;font-weight:600;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acct .btn{min-height:44px}
.sync{font-size:12px;font-weight:600;padding:9px 11px;border-radius:var(--r-sm);margin-bottom:10px;line-height:1.4}
.sync.ok{color:var(--accent);background:var(--accent-soft)}
.sync.warn{color:var(--warn);background:var(--warn-soft)}
.sync.danger{color:var(--danger);background:var(--danger-soft)}
.sync.muted{color:var(--muted);background:var(--surface-2)}
</style>
</head>
<body>

<div class="app">
  <header class="hero">
    <div class="hero-top">
      <div class="brand">
        <img src="icon-192.png" alt="" class="brand-logo">
        <div>
          <div class="eyebrow">C&amp;I Desk · SGRH</div>
          <h1>MediTrack</h1>
        </div>
      </div>
      <button class="iconbtn" id="btnRef" aria-label="Desk reference">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h6a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H2z"/><path d="M22 4h-6a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h7z"/></svg>
      </button>
    </div>
  </header>

  <div class="counts">
    <div class="count late"><b id="cLate">0</b><span>Action due</span></div>
    <div class="count pend"><b id="cPend">0</b><span>Waiting</span></div>
    <div class="count open"><b id="cOpen">0</b><span>Open</span></div>
  </div>

  <div class="srch">
    <div class="srchbox">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="srch" placeholder="Search patient, company, doctor…" autocomplete="off">
    </div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab on" data-tab="domestic" role="tab">Domestic</button>
    <button class="tab" data-tab="international" role="tab">International</button>
    <button class="tab" data-tab="open" role="tab">Open</button>
  </div>

  <div class="list" id="list"></div>
  <div class="note" id="note"></div>

  <button class="fab" id="fabAdd">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    New case
  </button>
</div>

<!-- shared backdrop for bottom sheets -->
<div class="sheetbg" id="sheetbg"></div>

<!-- New / Edit case sheet -->
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <h2 id="sheetTitle">New case</h2>
  <div class="seg" id="catSeg">
    <button data-cat="company" class="on">Company</button>
    <button data-cat="international">International</button>
    <button data-cat="cash">Cash</button>
  </div>

  <div class="fld"><label for="fNm">Patient name *</label><input id="fNm" placeholder="e.g. Ramesh Kumar" autocomplete="off"></div>

  <div id="grpCompany">
    <div class="two">
      <div class="fld"><label for="fEmp">Emp ID *</label><input id="fEmp" placeholder="e.g. 45210" autocomplete="off"></div>
      <div class="fld"><label for="fReg">Reg ID *</label><input id="fReg" placeholder="e.g. SGRH/2026/…" autocomplete="off"></div>
    </div>
    <div class="fld codrop"><label for="fCoSel">Company * (search &amp; select)</label>
      <input id="fCoSel" placeholder="Type to search company…" autocomplete="off">
      <div class="colist" id="coList"></div>
    </div>
    <div class="two">
      <div class="fld"><label for="fAd">Approval days</label><input id="fAd" type="number" min="1" placeholder="default 7" inputmode="numeric"></div>
      <div class="fld"><label for="fDy">Follow-up days</label><input id="fDy" type="number" min="1" placeholder="1" inputmode="numeric"></div>
    </div>
    <div class="fld"><label for="fEm">Company email (for approval mail)</label><input id="fEm" type="email" placeholder="hr@company.com" autocomplete="off"></div>
  </div>

  <div id="grpIntl" style="display:none;">
    <div class="fld"><label for="fRegI">Reg No *</label><input id="fRegI" placeholder="e.g. SGRH/2026/…" autocomplete="off"></div>
    <div class="fld"><label for="fWard">Admitted in *</label><input id="fWard" placeholder="e.g. Ward 4B / Room 312" autocomplete="off"></div>
    <div class="two">
      <div class="fld"><label for="fDtI">Admission date *</label><input id="fDtI" type="date"></div>
      <div class="fld"><label for="fTmI">Admission time *</label><input id="fTmI" type="time"></div>
    </div>
    <div class="fld"><label for="fCty">Country</label><input id="fCty" placeholder="e.g. Bangladesh" autocomplete="off"></div>
  </div>

  <div id="grpCash" style="display:none;">
    <div class="fld"><label for="fRegC">Reg ID</label><input id="fRegC" placeholder="e.g. SGRH/2026/…" autocomplete="off"></div>
  </div>

  <div class="fld"><label for="fPh">Patient phone</label><input id="fPh" type="tel" placeholder="98XXXXXXXX" inputmode="tel" autocomplete="off"></div>
  <div class="fld"><label for="fDr">Treating doctor *</label><input id="fDr" placeholder="e.g. Dr. Mehta" autocomplete="off"></div>

  <div id="grpDom2">
    <div class="fld"><label for="fDt">Date of admission *</label><input id="fDt" type="date"></div>
  </div>

  <div class="fld"><label for="fNo">Remarks</label><textarea id="fNo" placeholder="Any remarks — ward, UHID, reference, condition…"></textarea></div>

  <div class="savebar">
    <button class="btn" id="btnCancel">Cancel</button>
    <button class="btn pri" id="btnSave">Save case</button>
  </div>
</div>

<!-- Discharge sheet -->
<div class="sheet" id="dsheet" role="dialog" aria-modal="true">
  <h2>Discharge patient</h2>
  <div class="fulog" id="dWho" style="margin:-6px 0 12px;"></div>
  <div class="two">
    <div class="fld"><label for="dDt">Date of discharge *</label><input id="dDt" type="date"></div>
    <div class="fld"><label for="dTm">Time of discharge *</label><input id="dTm" type="time"></div>
  </div>
  <div class="fulog" id="dNote"></div>
  <div class="savebar">
    <button class="btn" id="dCancel">Cancel</button>
    <button class="btn pri" id="dConfirm">Confirm discharge</button>
  </div>
</div>

   Firestore document (workspace/main), shared by every signed-in

   ================================================================ */

function fbInit(){
  if(typeof firebase==='undefined'||!firebase.initializeApp)return false;
  try{
    firebase.initializeApp(firebaseConfig);
    auth=firebase.auth();
    // keep the session on this device so re-login isn't needed on every open
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
    db=firebase.firestore();
    // Auto-detect long-polling so real-time updates work on networks/proxies that

    try{db.settings({experimentalAutoDetectLongPolling:true});}catch(e){}
    db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); // offline cache; ok if it fails
    docRef=db.collection('workspace').doc('main');

/* visible sync status (shown in the Desk-reference menu) */
function setSync(kind,text){
  const el=$('syncStatus'); if(!el)return;
  el.className='sync '+kind; el.textContent=text;
}
function syncErrText(e){
  const c=(e&&e.code)||'';
  if(c==='permission-denied')return 'Sync blocked — Firestore rules deny access. Check the rules include your login email.';
  if(c==='unavailable')return 'Can’t reach the server — check your internet.';
  if(c==='failed-precondition'||c==='not-found')return 'Database not found — create the Firestore database in Firebase.';
  return 'Sync error: '+(c||(e&&e.message)||'unknown');
}

/* push the whole workspace (debounced; JSON-clean drops undefined for Firestore) */
function queuePush(){
  if(!docRef||!auth||!auth.currentUser)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    try{
      docRef.set(JSON.parse(JSON.stringify({cases,ents,cos})))
        .catch(e=>{ setSync('danger',syncErrText(e)); if(e&&e.code==='permission-denied')toast('Sync blocked — check Firestore rules','danger'); });
    }catch(e){}
  },400);
}

/* adopt a cloud snapshot into memory + local mirror, then repaint */
function applyCloud(d){
  if(Array.isArray(d.cases))cases=d.cases;
  if(d.ents&&typeof d.ents==='object')ents=d.ents;
  if(d.cos&&typeof d.cos==='object')cos=d.cos;
  try{localStorage.setItem(CASES_KEY,JSON.stringify(cases));}catch(e){}
  try{localStorage.setItem(ENT_KEY,JSON.stringify(ents));}catch(e){}
  try{localStorage.setItem(CO_KEY,JSON.stringify(cos));}catch(e){}
  render(); checkNotify();
}

/* one-time-per-device merge of this device's local data into the cloud.
   Union-by-id means the first device's existing cases are never lost, and
   later devices don't create duplicates. Needs connectivity (transaction). */
async function bootstrapCloud(){
  const FLAG='ci_cloud_boot_'+firebaseConfig.projectId;
  if(localStorage.getItem(FLAG))return;
  try{
    await db.runTransaction(async t=>{
      const snap=await t.get(docRef);
      const cloud=snap.exists?(snap.data()||{}):{};
      const cCases=Array.isArray(cloud.cases)?cloud.cases:[];
      const ids=new Set(cCases.map(c=>c.id));
      const out={
        cases:cCases.concat(cases.filter(c=>!ids.has(c.id))),
        ents:(cloud.ents&&Object.keys(cloud.ents).length)?cloud.ents:ents,
        cos:(cloud.cos&&Object.keys(cloud.cos).length)?cloud.cos:cos
      };
      t.set(docRef,JSON.parse(JSON.stringify(out)));
    });
    localStorage.setItem(FLAG,'1');
  }catch(e){
    // leave FLAG unset so this retries next session; surface real (non-offline) errors
    if(e&&e.code&&e.code!=='unavailable')setSync('danger',syncErrText(e));
  }
}

function startCloud(){
  if(cloudOn)return; cloudOn=true;
  setSync('muted','Connecting…');
  bootstrapCloud();
  cloudUnsub=docRef.onSnapshot(
    {includeMetadataChanges:true},
    snap=>{
      if(snap.exists)applyCloud(snap.data()||{});
      if(snap.metadata.fromCache) setSync('warn','Offline — changes will sync when you reconnect');
      else setSync('ok','Synced across your devices');
    },
    err=>{ setSync('danger',syncErrText(err)); if(err&&err.code==='permission-denied')toast('Sync blocked — check Firestore rules','danger'); }
  );
}
function stopCloud(){
  if(cloudUnsub){cloudUnsub();cloudUnsub=null;}
  cloudOn=false;
}

/* ================================================================
   Status model
   ----------------------------------------------------------------
   company:  pending -> approved (Open) -> [discharge => removed]
   cash:     open (Open)                -> [discharge => removed]
   intl:     pending (C-Form) -> cform-done (Open)
             -> [discharge => frro] -> [FRRO done => removed]
   ================================================================ */
const pendingResp=c=>c.status==='pending'||(c.cat==='international'&&c.status==='frro');
const openStat=c=>['approved','open','cform-done'].includes(c.status);

function state(c){
  if(c.cat==='international'&&c.status==='pending'){
    const h=hrsSince(c.admitTs);
    if(h>=WINDOW_H)return 'late';
    if(h>=WINDOW_H-6)return 'warn';
    return 'ok';
  }
  if(c.cat==='international'&&c.status==='frro'){
    const h=hrsSince(c.dischargeTs);
    if(h>=WINDOW_H)return 'late';
    if(h>=WINDOW_H-6)return 'warn';
    return 'ok';
  }
  if(c.cat==='company'&&c.status==='pending'){
    if(!c.days)return 'ok';
    const el=daysSince(c.sent);
    if(el>c.days){
      if(c.snooze&&today()<new Date(c.snooze+'T00:00:00'))return 'chased';
      return 'late';
    }
    if(el>=c.days-1)return 'warn';
    return 'ok';
  }
  if(c.cat==='company'&&c.status==='approved'){
    if(!c.validTill)return 'ok';
    const over=daysSince(c.validTill);
    if(over>0)return 'late';
    if(over>=-1)return 'warn';
    return 'ok';
  }
  return 'ok';
}

function emptyState(icon,title,text){
  return `<div class="empty"><div class="ic">${icon}</div><b>${title}</b><p>${text}</p></div>`;
}

function render(){
  let pool;
  if(tab==='domestic') pool=cases.filter(c=>c.cat!=='international'&&c.status==='pending');
  else if(tab==='international') pool=cases.filter(c=>c.cat==='international'&&pendingResp(c));
  else pool=cases.filter(openStat);

  const late=pool.filter(c=>state(c)==='late').length;
  $('cLate').textContent=late;
  $('cPend').textContent=Math.max(pool.length-late,0);
  $('cOpen').textContent=cases.filter(openStat).length;

  let show=pool;
  if(query){
    const q=query.toLowerCase();
    show=show.filter(c=>[c.name,c.co,c.emp,c.regId,c.dr,c.ward,c.country,c.notes,c.phone].map(x=>x||'').join(' ').toLowerCase().includes(q));
  }
  const rank={late:0,warn:1,chased:2,ok:3};
  show=show.slice().sort((a,b)=>rank[state(a)]-rank[state(b)]);

  const L=$('list'); L.innerHTML='';
  if(!show.length){
    L.innerHTML=query
      ? emptyState(IC.search,'No matches','No cases match your search. Try a name, company, or Reg ID.')
      : tab==='international'
      ? emptyState(IC.globe,'All clear','No international action pending — no C-Form or FRRO entries due.')
      : tab==='open'
      ? emptyState(IC.checkCircle,'No admitted patients','Approved company, cash, and C-Form-done international patients appear here until discharge.')
      : emptyState(IC.inbox,'No approvals awaited','Tap “New case” below to add a company patient.');
  }
  show.forEach((c,i)=>L.appendChild(makeCard(c,i)));

  $('note').textContent=late
    ? '⚠ '+late+' case'+(late===1?'':'s')+' in this tab need'+(late===1?'s':'')+' action now.'
    : 'Open the app each morning — urgent cases rise to the top automatically.';
}

function hourChip(ts,label,st){
  const h=hrsSince(ts), left=WINDOW_H-h;
  if(left>0){
    const hh=Math.floor(left), mm=Math.round((left-hh)*60);
    return `<div class="dchip d-${st==='warn'?'warn':st==='late'?'late':'ok'}"><b>${hh}h ${mm}m</b><span>${label} left</span></div>`;
  }
  return `<div class="dchip d-late"><b>${Math.floor(-left)}h over</b><span>${label} due</span></div>`;
}

const actBtn=(act,id,label,cls,icon)=>
  `<button class="btn${cls?' '+cls:''}" data-act="${act}" data-id="${id}">${icon||''}${label}</button>`;

function makeCard(c,idx){
  const st=state(c);
  let chip='', sub='', pills='', actions='';
  const catPill=`<span class="pill cat">${c.cat==='company'?'Company':c.cat==='international'?'International':'Cash'}</span>`;

  if(c.cat==='international'&&c.status==='pending'){
    chip=hourChip(c.admitTs,'C-Form',st);
    if(st==='late')pills+=`<span class="pill alert">C-FORM OVERDUE</span>`;
  }
  else if(c.cat==='international'&&c.status==='frro'){
    chip=hourChip(c.dischargeTs,'FRRO',st);
    if(st==='late')pills+=`<span class="pill alert">FRRO OVERDUE</span>`;
    pills+=`<span class="pill">Discharged ${esc(fmtDT(c.dischargeTs))}</span>`;
  }
  else if(c.cat==='international'&&c.status==='cform-done'){
    chip=`<div class="dchip d-ok"><b>✓</b><span>admitted</span></div>`;
    pills+=`<span class="pill">C-Form filled</span>`;
  }
  else if(c.cat==='company'&&c.status==='approved'){
    if(c.validTill){
      const leftD=-daysSince(c.validTill);
      if(leftD>0){
        chip=`<div class="dchip d-${leftD<=1?'warn':'ok'}"><b>${leftD}d</b><span>approval left</span></div>`;
        pills+=`<span class="pill">Approved till ${fmt(c.validTill)}</span>`;
      }else{
        chip=`<div class="dchip d-late"><b>${-leftD}d over</b><span>extension due</span></div>`;
        pills+=`<span class="pill alert">EXTENSION DUE — approval ended ${fmt(c.validTill)}</span>`;
      }
    }else{
      chip=`<div class="dchip d-ok"><b>✓</b><span>approved</span></div>`;
      pills+=`<span class="pill chased">Set approval days via Edit</span>`;
    }
  }
  else if(c.cat==='company'&&c.status==='pending'){
    if(c.days){
      const el=daysSince(c.sent);
      chip=`<div class="dchip d-${st==='late'?'late':(st==='warn'||st==='chased')?'warn':'ok'}"><b>D+${el}</b><span>of ${c.days} days</span></div>`;
      if(st==='late')pills+=`<span class="pill alert">FOLLOW UP — ${el-c.days}d over</span>`;
      if(st==='chased')pills+=`<span class="pill chased">Chased — re-flags ${fmt(c.snooze)}</span>`;
    }else chip=`<div class="dchip d-ok"><b>—</b><span>no timer</span></div>`;

  else{ // cash, open

    actions=`<div class="acts">
        ${actBtn('dischargeFor',c.id,'Discharge')}
        ${actBtn('undoCform',c.id,'Undo C-Form','',IC.undo)}
        ${actBtn('editCase',c.id,'Edit','sm')}
      </div>`;
  }else if(c.cat==='international'&&c.status==='frro'){
    actions=`<div class="acts">
        ${actBtn('frroDone',c.id,'Entered on FRRO portal','grn',IC.check)}
      </div>
      <div class="acts">
        ${actBtn('undoDischarge',c.id,'Undo discharge','',IC.undo)}

    actions=`<div class="acts">
        ${actBtn('dischargeFor',c.id,'Discharge')}
        ${actBtn('editCase',c.id,'Edit','sm')}
      </div>`;
  }

  const d=document.createElement('div');
  d.className='card'+(st==='late'?' flag':'');
  d.style.setProperty('--i',Math.min(idx,8));

    <div class="row1">

  return d;
}

/* ================================================================

   ================================================================ */
function logFU(id){
  const c=byId(id); if(!c)return;
  const prev=snapCases();
  c.fu=c.fu||[]; c.fu.push(iso(today()));
  const s=today(); s.setDate(s.getDate()+SNOOZE_DAYS); c.snooze=iso(s);
  saveCases(); render();
  offerUndo(prev,'Logged — re-flags on '+fmt(c.snooze)+' if still pending');
}
function approveCase(id){
  const c=byId(id); if(!c)return;
  const prev=snapCases();
  c.status='approved';
  c.validTill=addDays(c.sent,c.apprDays||7);
  saveCases(); render();
  offerUndo(prev,'Approved — moved to Open, valid till '+fmt(c.validTill));
}
async function extendCase(id){
  const c=byId(id); if(!c)return;
  const from=c.validTill||iso(today());
  const ans=await uiPrompt({
    title:'Extension approved',
    message:'How many days were approved? They’ll be added to the current approval ('+fmt(from)+').',
    placeholder:'e.g. 7',
    value:c.apprDays?String(c.apprDays):'',
    inputmode:'numeric',
    okText:'Add days'
  });
  if(ans===null)return;                       // cancelled
  const n=parseInt(ans,10);
  if(!n||n<1){toast('Enter a valid number of days','warn');return;}
  const prev=snapCases();
  c.validTill=addDays(from,n);
  saveCases(); render();
  offerUndo(prev,'Extension approved — +'+n+' day'+(n===1?'':'s')+', valid till '+fmt(c.validTill));
}
function cformDone(id){
  const c=byId(id); if(!c)return;
  const prev=snapCases();
  c.status='cform-done'; saveCases(); render();
  offerUndo(prev,'C-Form filled — patient moved to Open');
}
async function frroDone(id){
  const c=byId(id); if(!c)return;
  const ok=await uiConfirm({
    title:'FRRO entry done?',
    message:'FRRO entry done for '+c.name+'? The case will be closed and removed.',
    okText:'FRRO done'
  });
  if(!ok)return;
  const prev=snapCases();
  cases=cases.filter(x=>x.id!==id); saveCases(); render();
  offerUndo(prev,'FRRO done — case closed and removed');
}

/* ---- persistent "move back" reverts (for actions taken by mistake) ---- */
function undoApproval(id){            // company: approved -> pending (Open -> Domestic)
  const c=byId(id); if(!c)return;
  const prev=snapCases();
  c.status='pending'; c.validTill=null;
  saveCases(); setTab('domestic');
  offerUndo(prev,'Approval undone — moved back to Domestic');
}
function undoCform(id){               // international: cform-done -> pending (Open -> International)
  const c=byId(id); if(!c)return;
  const prev=snapCases();
  c.status='pending';
  saveCases(); setTab('international'); checkNotify();
  offerUndo(prev,'C-Form undone — moved back to International');
}
function undoDischarge(id){           // international: frro -> cform-done (un-discharge, back to Open)
  const c=byId(id); if(!c)return;
  const prev=snapCases();
  c.status='cform-done'; c.dischargeTs=null; c.notifiedF=[];
  saveCases(); setTab('open');
  offerUndo(prev,'Discharge undone — patient back in Open');
}
/* kept for parity with the original build (console utility; not wired to UI) */
window.delCase=async id=>{
  const ok=await uiConfirm({title:'Delete case?',message:'Delete this case permanently?',okText:'Delete',danger:true});

/* ---------- discharge flow ---------- */
function dischargeFor(id){
  const c=byId(id); if(!c)return;
  dischargeId=id;
  $('dWho').textContent=c.name+(c.co?' · '+c.co:'')+(c.cat==='international'?' · International':'');
  $('dNote').textContent=c.cat==='international'
    ? 'After discharge, a 24-hour FRRO portal clock will start for this patient.'
    : 'On discharge, this case will be closed and removed from the tracker.';
  $('dDt').value=iso(today());
  $('dTm').value=new Date().toTimeString().slice(0,5);
  $('dsheet').classList.add('open'); syncBackdrop();
}
function closeDsheet(){
  $('dsheet').classList.remove('open'); dischargeId=null; syncBackdrop();
}
function saveDischarge(){
  const c=byId(dischargeId); if(!c){closeDsheet();return;}
  const dt=$('dDt').value, tm=$('dTm').value;
  if(!dt||!tm){toast('Enter discharge date and time','warn');return;}
  const prev=snapCases();
  if(c.cat==='international'){
    c.status='frro';
    c.dischargeTs=new Date(dt+'T'+tm).toISOString();
    c.notifiedF=[];
    saveCases(); closeDsheet();
    setTab('international');
    checkNotify();
    offerUndo(prev,'Discharged — FRRO 24h clock started');
  }else{
    cases=cases.filter(x=>x.id!==dischargeId);
    saveCases(); closeDsheet(); render();
    offerUndo(prev,'Discharged — case closed and removed');
  }
}

const ACTIONS={approvalEmail,chaseEmail,extensionEmail,logFU,approveCase,extendCase,cformDone,frroDone,dischargeFor,editCase,undoApproval,undoCform,undoDischarge};

/* ================================================================
   24h reminders (C-Form + FRRO, while app is open)
   ================================================================ */
function notifyFor(c,ts,listKey,label){
  const h=hrsSince(ts);
  const t=Math.floor(h/6)*6;
  c[listKey]=c[listKey]||[];
  if(t>=6&&!c[listKey].includes(t)){
    c[listKey].push(t); saveCases();
    const left=WINDOW_H-h;
    const msg=left>0
      ? `${label} pending for ${c.name} — ${Math.floor(left)}h left of 24h window`
      : `${label} OVERDUE for ${c.name} — ${Math.floor(-left)}h past the 24h deadline`;
    if('Notification' in window&&Notification.permission==='granted'){
      try{new Notification('MediTrack',{body:msg,icon:'icon-192.png'});}catch(e){toast(msg);}
    }else toast(msg);
  }
}
function checkNotify(){
  const need=cases.some(c=>c.cat==='international'&&(c.status==='pending'||c.status==='frro'));
  if(!need)return;
  if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
  cases.forEach(c=>{
    if(c.cat!=='international')return;
    if(c.status==='pending')notifyFor(c,c.admitTs,'notified','C-Form');
    if(c.status==='frro')notifyFor(c,c.dischargeTs,'notifiedF','FRRO entry');
  });
}

function renderCoList(filter){

  box.querySelectorAll('.coopt').forEach(o=>{

      }else $('fCoSel').value=o.dataset.co;
      box.classList.remove('open');
    };
  });
}

function editCase(id){

  editId=id; setCat(c.cat||'company');
  $('sheetTitle').textContent='Edit case';
  $('btnSave').textContent='Save changes';
  $('fNm').value=c.name||''; $('fPh').value=c.phone||''; $('fDr').value=c.dr||''; $('fNo').value=c.notes||'';
  $('fEmp').value=c.emp||''; $('fReg').value=(c.cat==='company')?(c.regId||''):''; $('fCoSel').value=c.co||'';
  $('fRegI').value=(c.cat==='international')?(c.regId||''):''; $('fWard').value=c.ward||''; $('fCty').value=c.country||'';
  $('fRegC').value=(c.cat==='cash')?(c.regId||''):'';
  $('fDt').value=c.sent||iso(today()); $('fDy').value=c.days||''; $('fAd').value=c.apprDays||''; $('fEm').value=c.email||'';
  if(c.admitTs){const d=new Date(c.admitTs);$('fDtI').value=iso(d);$('fTmI').value=d.toTimeString().slice(0,5);}

function saveCase(){
  const nm=$('fNm').value.trim(), dr=$('fDr').value.trim();
  if(!nm){toast('Enter patient name','warn');return;}
  if(!dr){toast('Enter treating doctor','warn');return;}
  const f={name:nm,dr:dr,phone:$('fPh').value.trim(),notes:$('fNo').value.trim(),cat:cat};
  let newStatus='pending';

  if(cat==='company'){
    const emp=$('fEmp').value.trim(), reg=$('fReg').value.trim(), co=$('fCoSel').value.trim();
    if(!emp){toast('Enter Emp ID','warn');return;}
    if(!reg){toast('Enter Reg ID','warn');return;}
    if(!co){toast('Select the company','warn');return;}
    if(!Object.keys(cos).concat(Object.keys(ents)).some(k=>k.toLowerCase()===co.toLowerCase())){toast('Pick the company from the dropdown (or add it)','warn');return;}
    const dt=$('fDt').value, dy=parseInt($('fDy').value,10)||null;
    const ad=parseInt($('fAd').value,10)||null;
    if(!dt){toast('Enter date of admission','warn');return;}
    Object.assign(f,{emp:emp,regId:reg,co:co,sent:dt,days:dy,apprDays:ad,email:$('fEm').value.trim()});
  }
  else if(cat==='international'){
    const reg=$('fRegI').value.trim(), ward=$('fWard').value.trim(), dt=$('fDtI').value, tm=$('fTmI').value;
    if(!reg){toast('Enter Reg No','warn');return;}
    if(!ward){toast('Enter where the patient is admitted','warn');return;}
    if(!dt||!tm){toast('Enter admission date and time','warn');return;}
    Object.assign(f,{regId:reg,ward:ward,country:$('fCty').value.trim(),admitTs:new Date(dt+'T'+tm).toISOString()});
  }
  else{
    const dt=$('fDt').value;
    if(!dt){toast('Enter date of admission','warn');return;}
    Object.assign(f,{regId:$('fRegC').value.trim(),sent:dt});
    newStatus='open';
  }

  if(editId){
    const c=byId(editId);
    if(c){
      const wasApproved=(c.status==='approved');
      Object.assign(c,f);
      if(wasApproved&&c.cat==='company'&&c.apprDays&&!c.validTill)c.validTill=addDays(c.sent,c.apprDays);
      if(wasApproved&&c.cat==='company'&&c.apprDays&&c.validTill&&daysSince(c.sent)>=0&&new Date(c.validTill)<new Date(c.sent))c.validTill=addDays(c.sent,c.apprDays);
    }
    toast('Case updated');
  }else{
    cases.push(Object.assign({id:uid(),status:newStatus,fu:[],snooze:null,notified:[],notifiedF:[]},f));
    toast(cat==='international'?'Saved — C-Form 24h clock started':cat==='cash'?'Saved to Open':'Case saved');
  }
  editId=null; saveCases(); closeSheet();
  setTab(f.cat==='international'?'international':f.cat==='cash'?'open':'domestic');
  checkNotify();
}

    d.innerHTML=`<button class="ehead"><span>${esc(a)}</span><span class="esub">${esc(c.emp||'')}</span>${IC.chev}</button>
      <div class="ereveal"><div class="ebody"><div class="ebody-in">
        <div class="lines"><b>${esc(c.name||'')}</b>\nEmpanelled: ${esc(c.emp||'-')}\n\nIPD: ${esc(c.ipd||'-')}\n\nOPD: ${esc(c.opd||'-')}</div>
        <div class="eacts"><button class="btn" data-e="edit">Edit</button></div>
      </div></div></div>`;
    d.querySelector('.ehead').onclick=()=>d.classList.toggle('open');
    d.querySelector('[data-e="edit"]').onclick=()=>editCo(a,d);
    L.appendChild(d);
  });
  if(!L.children.length)L.innerHTML=emptyState(IC.search,'No company found','Use + Add to create one.');
}
function editCo(acr,card){
  const c=cos[acr]||{};
  const box=card.querySelector('.ebody-in');
  box.innerHTML=`
    <div class="fld" style="margin-top:8px;"><label>Full name</label><input class="co-nm"></div>
    <div class="fld"><label>Empanelled (Y / N / Check)</label><input class="co-em"></div>
    <div class="fld"><label>What we offer — IPD</label><textarea class="co-ip"></textarea></div>
    <div class="fld"><label>What we offer — OPD</label><textarea class="co-op"></textarea></div>
    <div class="eacts">
      <button class="btn pri" data-e="save">Save</button>
      <button class="btn" data-e="cancel">Cancel</button>
      <button class="btn danger" data-e="del">Delete</button>
    </div>`;
  box.querySelector('.co-nm').value=c.name||'';
  box.querySelector('.co-em').value=c.emp||'';
  box.querySelector('.co-ip').value=c.ipd||'';
  box.querySelector('.co-op').value=c.opd||'';
  box.querySelector('[data-e="save"]').onclick=()=>{
    cos[acr]={
      name:box.querySelector('.co-nm').value.trim(),
      emp:box.querySelector('.co-em').value.trim(),
      ipd:box.querySelector('.co-ip').value.trim(),
      opd:box.querySelector('.co-op').value.trim()
    };
    saveCos(); renderCos(); toast(acr+' updated');
  };
  box.querySelector('[data-e="cancel"]').onclick=()=>renderCos();
  box.querySelector('[data-e="del"]').onclick=async()=>{
    const ok=await uiConfirm({title:'Remove '+acr+'?',message:'This removes '+acr+' from the companies list.',okText:'Remove',danger:true});
    if(!ok)return;
    delete cos[acr]; saveCos(); renderCos(); toast(acr+' removed');
  };
}
async function addCo(){
  const n=await uiPrompt({title:'Add company',message:'Enter the company acronym.',placeholder:'e.g. NTPC',okText:'Add'});
  if(!n)return;
  const key=n.trim().toUpperCase(); if(!key)return;
  if(Object.keys(cos).some(k=>k.toLowerCase()===key.toLowerCase())){toast(key+' already exists','warn');return;}
  cos[key]={name:'',emp:'Y',ipd:'',opd:''}; saveCos(); renderCos();
  toast(key+' added — tap it and Edit to fill details');
}

/* ================================================================
   Tabs, search, wiring, init
   ================================================================ */
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===t));
  render();
}

function init(){
  /* main UI */
  $('fabAdd').onclick=openSheet;
  $('btnCancel').onclick=closeSheet;
  $('btnSave').onclick=saveCase;
  $('btnRef').onclick=openMenu;
  $('srch').oninput=e=>{query=e.target.value.trim();render();};
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setTab(t.dataset.tab));
  document.querySelectorAll('#catSeg button').forEach(b=>b.onclick=()=>setCat(b.dataset.cat));

  /* case-card actions (delegation) */
  $('list').addEventListener('click',e=>{
    const b=e.target.closest('[data-act]'); if(!b)return;
    const fn=ACTIONS[b.dataset.act]; if(fn)fn(b.dataset.id);
  });

  /* backdrop closes every open sheet */
  $('sheetbg').onclick=()=>{closeSheet();closeDsheet();closeMenu();};

  /* discharge sheet */
  $('dCancel').onclick=closeDsheet;
  $('dConfirm').onclick=saveDischarge;

  /* reference menu + panels */
  $('miEnts').onclick=()=>{closeMenu();openEnts();};
  $('miCos').onclick=()=>{closeMenu();openCos();};
  $('entBack').onclick=closeEnts;
  $('coBack').onclick=closeCos;
  $('entAdd').onclick=addCompany;
  $('coAdd').onclick=addCo;
  $('entSrch').oninput=renderEnts;
  $('coSrchP').oninput=renderCos;

  /* company dropdown */
  $('fCoSel').addEventListener('input',e=>renderCoList(e.target.value));
  $('fCoSel').addEventListener('focus',e=>renderCoList(e.target.value));
  document.addEventListener('click',e=>{
    if(!e.target.closest('.codrop'))$('coList').classList.remove('open');
  });

  /* dialog */
  $('dlgOk').onclick=()=>dlgClose(dlgHasInput?$('dlgInput').value:true);
  $('dlgCancel').onclick=()=>dlgClose(dlgHasInput?null:false);
  $('dlgBg').onclick=()=>dlgClose(dlgHasInput?null:false);
  $('dlgInput').addEventListener('keydown',e=>{if(e.key==='Enter')dlgClose($('dlgInput').value);});

  /* escape closes the top-most layer */
  document.addEventListener('keydown',e=>{
    if(e.key!=='Escape')return;
    if($('dlgBox').classList.contains('open')){dlgClose(dlgHasInput?null:false);return;}
    if($('coPanel').classList.contains('open')){closeCos();return;}
    if($('entPanel').classList.contains('open')){closeEnts();return;}
    closeSheet();closeDsheet();closeMenu();
  });

  /* sign in / out */
  $('loginForm').addEventListener('submit',doLogin);
  $('btnSignOut').onclick=()=>{closeMenu();if(auth)auth.signOut();};

  /* refresh the moment the app returns to the foreground (fresh data + time-based states) */
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden){render();checkNotify();} });

  /* periodic urgency refresh */
  setInterval(()=>{checkNotify();if(tab==='international')render();},60000);

  load();  // instant local-first paint from the localStorage mirror

  if(fbInit()){
    startAuthFlow();          // resumes a saved session + syncs, or shows the login screen
  }else{
    // Firebase SDK unavailable (e.g. offline first-ever run) — run local-only
    $('loginOverlay').classList.remove('show');
    $('acctBox').hidden=true;
  }

  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}
}
init();
</script>
</body>
</html>
